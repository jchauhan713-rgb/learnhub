<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LearnHub - Online Learning Platform</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header>
    <div class="container">
      <h1>LearnHub</h1>
      <p>Your gateway to knowledge</p>
    </div>
  </header>

  <main class="container">
    <section class="courses">
      <div class="course-card">
        <h3>Mathematics</h3>
        <p>Test your knowledge in basic mathematics with our comprehensive quiz.</p>
        <button class="btn" onclick="takeQuiz('math')">Take Quiz</button>
      </div>
      <div class="course-card">
        <h3>Science</h3>
        <p>Explore the wonders of science through our engaging quiz questions.</p>
        <button class="btn" onclick="takeQuiz('science')">Take Quiz</button>
      </div>
      <div class="course-card">
        <h3>History</h3>
        <p>Journey through time with our history quiz covering key events and figures.</p>
        <button class="btn" onclick="takeQuiz('history')">Take Quiz</button>
      </div>
    </section>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
